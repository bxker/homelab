apiVersion: v2
name: seafile
version: 1.0.0
description: Seafile file sync wrapper chart with MariaDB and Memcached
dependencies:
  # Official Seafile Helm chart (community edition)
  - name: ce
    version: "12.*"
    repository: https://haiwen.github.io/seafile-helm-chart/repo
    alias: seafile
# MariaDB and Memcached are hand-rolled in templates/ using official upstream
# images directly (mariadb:11.4, memcached:1.6) — Bitnami pulled versioned
# tags from docker.io behind a paid subscription in 2025.
