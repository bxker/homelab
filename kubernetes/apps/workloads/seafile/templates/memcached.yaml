apiVersion: v1
kind: Service
metadata:
  name: seafile-memcached
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: seafile-memcached
  ports:
    - port: 11211
      targetPort: 11211
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seafile-memcached
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: seafile-memcached
  template:
    metadata:
      labels:
        app: seafile-memcached
    spec:
      containers:
        - name: memcached
          image: {{ .Values.cache.image | quote }}
          args: ["-m", {{ .Values.cache.memoryLimitMb | quote }}]
          ports:
            - containerPort: 11211
          resources:
            {{- toYaml .Values.cache.resources | nindent 12 }}
          readinessProbe:
            tcpSocket:
              port: 11211
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 11211
            initialDelaySeconds: 15
            periodSeconds: 15
