apiVersion: apps/v1
kind: Deployment
metadata:
  name: adguard-home
  labels:
    app: adguard-home
spec:
  replicas: 1
  selector:
    matchLabels:
      app: adguard-home
  template:
    metadata:
      labels:
        app: adguard-home
    spec:
      initContainers:
        - name: copy-config
          image: busybox:1.36
          command: ["sh", "-c", "cp /tmp/config/AdGuardHome.yaml /opt/adguardhome/conf/AdGuardHome.yaml"]
          volumeMounts:
            - name: config-source
              mountPath: /tmp/config
            - name: config
              mountPath: /opt/adguardhome/conf
      containers:
        - name: adguard-home
          image: adguard/adguardhome:v0.107.74
          ports:
            - name: dns-tcp
              containerPort: 53
              protocol: TCP
            - name: dns-udp
              containerPort: 53
              protocol: UDP
            - name: http
              containerPort: 3000
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /opt/adguardhome/conf
            - name: data
              mountPath: /opt/adguardhome/work
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
      volumes:
        - name: config-source
          configMap:
            name: adguard-home-config
        - name: config
          emptyDir: {}
        - name: data
          emptyDir: {}
