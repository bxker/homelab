apiVersion: v1
kind: Service
metadata:
  name: adguard-home-dns
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/hostname: "homelab-dns"
spec:
  type: LoadBalancer
  selector:
    app: adguard-home
  ports:
    - name: dns-udp
      port: 53
      targetPort: 53
      protocol: UDP
    - name: dns-tcp
      port: 53
      targetPort: 53
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: adguard-home-http
spec:
  type: ClusterIP
  selector:
    app: adguard-home
  ports:
    - name: http
      port: 80
      targetPort: 3000
