# Secrets and host-specific values live in .env (gitignored).
# Create .env with: PROXMOX_URL, PROXMOX_API_TOKEN, PROXMOX_NODE
[env]
_.file = ".env"
CP_IP = "192.168.1.100"
W1_IP = "192.168.1.101"
W2_IP = "192.168.1.102"
CLUSTER_NAME = "homelab"

# ── Tool Versions ──
# `mise install` gets everything you need

[tools]
opentofu = "latest"
kubectl  = "latest"
helm     = "latest"
ansible  = "latest"
pipx = "latest"

# ══════════════════════════════════════
# Phase 1: Infrastructure
# ══════════════════════════════════════

[tasks.infra]
description = "Provision VMs on Proxmox"
run = """
cd terraform
tofu init
tofu apply -auto-approve
"""

[tasks.infra-plan]
description = "Preview infrastructure changes"
run = "cd terraform && tofu init && tofu plan"

[tasks.infra-destroy]
description = "Tear down all VMs"
run = "cd terraform && tofu destroy -auto-approve"

# ══════════════════════════════════════
# Phase 2: k3s Cluster
# ══════════════════════════════════════

[tasks.k3s-install]
description = "Install k3s on all nodes and write kubeconfig"
run = """
echo "Waiting for VMs to boot..."
for ip in "$CP_IP" "$W1_IP" "$W2_IP"; do
  for i in $(seq 1 60); do
    if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=3 ubuntu@$ip true 2>/dev/null; then
      echo "  $ip is up"
      break
    fi
    echo "  Waiting for $ip... ($i/60)"
    sleep 5
  done
done

cd ansible
ansible-playbook -i inventory.yml playbooks/k3s.yml
echo ""
echo "k3s cluster ready. Try: kubectl get nodes"
"""

[tasks.cluster]
description = "Full cluster setup (provision VMs + install k3s)"
run = """
mise run infra-destroy 2>/dev/null || true
mise run infra
mise run k3s-install
"""

# ══════════════════════════════════════
# Phase 3: GitOps
# ══════════════════════════════════════

[tasks.gitops]
description = "Install ArgoCD and deploy app-of-apps"
run = """
kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -

echo "Installing ArgoCD..."
kubectl apply -n argocd \
  -f https://raw.githubusercontent.com/argoproj/argo-cd/v2.13.3/manifests/install.yaml
kubectl apply -n argocd -f kubernetes/bootstrap/argocd-install.yaml

echo "Waiting for ArgoCD to be ready..."
kubectl wait --for=condition=available deployment/argocd-server \
  -n argocd --timeout=300s

echo "Deploying app-of-apps..."
kubectl apply -f kubernetes/apps/app-of-apps.yaml

echo ""
echo "ArgoCD is running. Apps will sync automatically."
echo "   Run: mise run argocd-password"
echo "   Run: mise run argocd-ui"
"""

[tasks.argocd-password]
description = "Get ArgoCD admin password"
run = """
kubectl -n argocd get secret argocd-initial-admin-secret \
  -o jsonpath='{.data.password}' | base64 -d
echo ""
"""

[tasks.argocd-ui]
description = "Port-forward ArgoCD UI to localhost:8080"
run = "kubectl port-forward svc/argocd-server -n argocd 8080:443"

# ══════════════════════════════════════
# Phase 4: Host Configuration
# ══════════════════════════════════════

[tasks.configure]
description = "Run Ansible on Proxmox host"
run = "cd ansible && ansible-playbook -i inventory.yml playbooks/proxmox.yml"

# ══════════════════════════════════════
# Lifecycle
# ══════════════════════════════════════

[tasks.all]
description = "Run everything in order"
depends = ["cluster", "gitops", "configure"]
run = """
echo ""
echo "========================================="
echo "  Homelab is up!"
echo "  Run: mise run argocd-password"
echo "  Run: mise run argocd-ui"
echo "  Then open https://localhost:8080"
echo "========================================="
"""

[tasks.sync]
description = "Push app-of-apps to ArgoCD (use on existing cluster instead of gitops)"
run = "kubectl apply -f kubernetes/apps/app-of-apps.yaml"

[tasks.destroy]
description = "Tear it all down"
depends = ["infra-destroy"]
run = """
echo "All VMs destroyed. Your Git repo still has everything to rebuild."
echo "Run: mise run all"
"""

[tasks.status]
description = "Show cluster and app status"
run = """
echo "=== Nodes ==="
kubectl get nodes -o wide 2>/dev/null || echo "Cluster not reachable"

echo ""
echo "=== ArgoCD Apps ==="
kubectl get applications -n argocd 2>/dev/null || echo "ArgoCD not installed"

echo ""
echo "=== LoadBalancer Services ==="
kubectl get svc -A --field-selector spec.type=LoadBalancer 2>/dev/null || echo "None"
"""

# ══════════════════════════════════════
# OpenBao (Secrets Management)
# Run once after first gitops deploy:
#   mise run vault-init   → initialize, save printed keys to password manager
#   mise run vault-unseal → unseal (repeat after pod restarts)
#   mise run vault-setup  → configure k8s auth + ESO policy
#   vault kv put secret/tailscale client_id=xxx client_secret=yyy
# ══════════════════════════════════════

[tasks.vault-init]
description = "Initialize OpenBao (run once after first deploy)"
run = """
kubectl port-forward -n openbao svc/openbao 8200:8200 &
PF_PID=$!
sleep 3
export VAULT_ADDR=http://127.0.0.1:8200
bao operator init -key-shares=3 -key-threshold=2
kill $PF_PID 2>/dev/null
echo ""
echo "Save the unseal keys and root token to your password manager."
echo "You need 2 of 3 keys to unseal."
"""

[tasks.vault-unseal]
description = "Unseal OpenBao (needed after pod restarts)"
run = """
kubectl port-forward -n openbao svc/openbao 8200:8200 &
PF_PID=$!
sleep 3
export VAULT_ADDR=http://127.0.0.1:8200
echo "Enter unseal key 1:"; bao operator unseal
echo "Enter unseal key 2:"; bao operator unseal
bao status
kill $PF_PID 2>/dev/null
"""

[tasks.vault-setup]
description = "Configure OpenBao k8s auth and ESO policy (run once after vault-init)"
run = """
kubectl port-forward -n openbao svc/openbao 8200:8200 &
PF_PID=$!
sleep 3
export VAULT_ADDR=http://127.0.0.1:8200

echo "Root token: "; read -s VAULT_TOKEN; export VAULT_TOKEN

bao secrets list | grep -q '^secret/' || bao secrets enable -path=secret kv-v2

bao auth list | grep -q '^kubernetes/' || bao auth enable kubernetes

# Provide CA cert and reviewer JWT explicitly for k3s compatibility
K8S_CA=$(kubectl config view --raw -o jsonpath='{.clusters[0].cluster.certificate-authority-data}' | base64 -d)
REVIEWER_JWT=$(kubectl create token openbao -n openbao --duration=8760h 2>/dev/null || \
  kubectl get secret -n openbao -o jsonpath='{.items[?(@.type=="kubernetes.io/service-account-token")].data.token}' | base64 -d)

bao write auth/kubernetes/config \
  kubernetes_host="https://kubernetes.default.svc:443" \
  kubernetes_ca_cert="$K8S_CA" \
  token_reviewer_jwt="$REVIEWER_JWT"

bao policy write external-secrets - <<'EOF'
path "secret/data/*" {
  capabilities = ["read"]
}
EOF

bao write auth/kubernetes/role/external-secrets \
  bound_service_account_names=external-secrets \
  bound_service_account_namespaces=external-secrets \
  policies=external-secrets \
  ttl=24h

kill $PF_PID 2>/dev/null
echo ""
echo "OpenBao configured. Run 'mise run vault-write' to add secrets."
"""

[tasks.vault-write]
description = "Open a port-forward to write secrets into OpenBao"
run = """
kubectl port-forward -n openbao svc/openbao 8200:8200 &
PF_PID=$!
sleep 3
export VAULT_ADDR=http://127.0.0.1:8200
echo "Port-forward ready. In another terminal:"
echo "  export VAULT_ADDR=http://127.0.0.1:8200"
echo "  export VAULT_TOKEN=<root-token>"
echo "  bao kv put secret/tailscale client_id=xxx client_secret=yyy"
echo ""
echo "Press Ctrl-C when done."
wait $PF_PID
"""

[tasks.deps]
description = "Build Helm chart dependencies for all wrapper charts"
run = """
for chart in kubernetes/apps/infrastructure/*/Chart.yaml kubernetes/apps/workloads/*/Chart.yaml; do
  dir=$(dirname "$chart")
  echo "Building deps for $dir..."
  helm dependency build "$dir" 2>/dev/null || echo "  (no deps or already built)"
done
echo "All chart dependencies resolved"
"""
