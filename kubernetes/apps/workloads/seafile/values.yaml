# ── Seafile (upstream chart values) ──
seafile:
  initMode: true  # Set to false after first successful startup
  seafile:
    config:
      seafileDataVolume:
        storageClassName: longhorn
        size: 20Gi
    env:
      INIT_SEAFILE_ADMIN_EMAIL: "admin@homelab.local"
      SEAFILE_SERVER_HOSTNAME: "files.homelab.local"
      TIME_ZONE: "America/New_York"
      DB_HOST: "seafile-mariadb"
  service:
    type: ClusterIP  # Exposed via our Ingress template below

# ── MariaDB (hand-rolled, templates/mariadb.yaml) ──
database:
  image: "mariadb:11.4"
  database: seafile
  username: seafile
  storageClassName: longhorn
  size: 5Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi

# ── Memcached (hand-rolled, templates/memcached.yaml) ──
cache:
  image: "memcached:1.6-alpine"
  memoryLimitMb: 128
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi
