# ── Seafile (upstream chart values) ──
seafile:
  initMode: true  # Set to false after first successful startup
  seafile:
    config:
      seafileDataVolume:
        storageClassName: longhorn
        size: 20Gi
    env:
      INIT_SEAFILE_ADMIN_EMAIL: "admin@homelab.local"
      SEAFILE_SERVER_HOSTNAME: "files.homelab.local"
      TIME_ZONE: "America/New_York"
      DB_HOST: "seafile-mariadb"
  service:
    type: ClusterIP  # Exposed via our Ingress template below

# ── MariaDB ──
mariadb:
  auth:
    existingSecret: seafile-mariadb-secret  # populated by ExternalSecret from OpenBao
    database: seafile
    username: seafile
  primary:
    persistence:
      enabled: true
      size: 5Gi
      storageClass: longhorn
    resources:
      requests:
        cpu: 100m
        memory: 256Mi

# ── Memcached ──
memcached:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi
