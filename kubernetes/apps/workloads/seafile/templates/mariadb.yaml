apiVersion: v1
kind: Service
metadata:
  name: seafile-mariadb
  namespace: {{ .Release.Namespace }}
spec:
  clusterIP: None
  selector:
    app: seafile-mariadb
  ports:
    - port: 3306
      targetPort: 3306
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: seafile-mariadb
  namespace: {{ .Release.Namespace }}
spec:
  serviceName: seafile-mariadb
  replicas: 1
  selector:
    matchLabels:
      app: seafile-mariadb
  template:
    metadata:
      labels:
        app: seafile-mariadb
    spec:
      containers:
        - name: mariadb
          image: {{ .Values.database.image | quote }}
          envFrom:
            - secretRef:
                name: seafile-mariadb-secret
          env:
            - name: MARIADB_DATABASE
              value: {{ .Values.database.database | quote }}
            - name: MARIADB_USER
              value: {{ .Values.database.username | quote }}
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
          resources:
            {{- toYaml .Values.database.resources | nindent 12 }}
          readinessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 30
            periodSeconds: 15
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.database.storageClassName | quote }}
        resources:
          requests:
            storage: {{ .Values.database.size | quote }}
