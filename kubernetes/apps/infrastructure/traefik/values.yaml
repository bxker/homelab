traefik:
  deployment:
    replicas: 1

  service:
    type: LoadBalancer
    annotations:
      tailscale.com/expose: "true"
      tailscale.com/hostname: "homelab-traefik"

  ports:
    web:
      redirectTo:
        port: websecure
    websecure:
      tls:
        enabled: true

  logs:
    general:
      level: INFO
    access:
      enabled: true

  ingressRoute:
    dashboard:
      enabled: true
      matchRule: Host(`traefik.homelab.local`)
