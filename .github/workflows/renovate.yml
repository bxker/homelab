name: Renovate
on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 1" # Weekly Monday 4am UTC

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: renovatebot/github-action@v40
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
          configurationFile: renovate.json
